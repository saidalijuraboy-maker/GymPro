workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Setup project
        script: |
          flutter create --org com.gymapp --project-name workout_app /tmp/new_project
          cp /tmp/new_project/ios /Users/builder/clone/ios -r
          cp /tmp/new_project/android /Users/builder/clone/android -r
          cp /tmp/new_project/macos /Users/builder/clone/macos -r
          flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
