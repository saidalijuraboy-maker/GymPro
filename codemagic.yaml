workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Setup Flutter project
        script: |
          cp lib/main.dart /tmp/main.dart
          cp pubspec.yaml /tmp/pubspec.yaml
          flutter create --org com.gymapp --project-name workout_app .
          cp /tmp/main.dart lib/main.dart
          cp /tmp/pubspec.yaml pubspec.yaml
          flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app


