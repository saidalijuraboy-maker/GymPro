workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Build
        script: |
          flutter create --org com.gymapp \
            --project-name workout_app /tmp/app
          cp lib/main.dart /tmp/app/lib/main.dart
          cp pubspec.yaml /tmp/app/pubspec.yaml
          cd /tmp/app
          flutter pub get
          flutter build ios --release --no-codesign
    artifacts:
      - /tmp/app/build/ios/iphoneos/Runner.app
