name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      - run: flutter create --org com.gymapp --project-name workout_app /tmp/app
      - run: cp /tmp/app/android android -r
      - run: cp /tmp/app/test test -r
      - run: cp lib/main.dart /tmp/app/lib/main.dart
      - run: cp pubspec.yaml /tmp/app/pubspec.yaml
      - run: cd /tmp/app && flutter pub get && flutter build apk --debug
      - uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: /tmp/app/build/app/outputs/flutter-apk/app-debug.apk
